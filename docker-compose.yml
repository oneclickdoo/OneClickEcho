# Optional: build both images with repo root as context (analytics JSON must match frontend):
#   docker compose build api dashboard
#
# API file logs: Serilog writes under /app/logs when ASPNETCORE_ENVIRONMENT=Docker (see Dockerfile_Api).
# log-rotator gzips *.log older than 49h and deletes *.gz older than 40 days (same volume).
# Docker json-file driver below caps stdout/stderr size per container (separate from /app/logs).
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile_Api
    image: oneclickecho-api:local
    # Optional: loads repo-root .env into the container (long names like Messaging__…). Omit file or set required: false if you have no .env.
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      # OpenIddict (RSA + Issuer): set in repo-root .env as OpenIddict__RsaPrivateKeyPkcs8 / OpenIddict__Issuer
      # (loaded via env_file above). Do NOT map ${OPENIDDICT_*:-} here — empty substitution overrides env_file and breaks login (ID2088).
      # Generate RSA: openssl genrsa 2048 | openssl pkcs8 -topk8 -nocrypt -outform DER | openssl base64 -A
      # Optional aliases for compose interpolation only (if you prefer OPENIDDICT_* names, uncomment and remove duplicates from env_file keys):
      # OpenIddict__RsaPrivateKeyPkcs8: ${OPENIDDICT_RSA_PRIVATE_KEY_PKCS8:-}
      # OpenIddict__Issuer: ${OPENIDDICT_ISSUER:-}
      # OpenIddict__SigningKey: ${OPENIDDICT_SIGNING_KEY:-}
      # OpenIddict__EncryptionKey: ${OPENIDDICT_ENCRYPTION_KEY:-}
      # Required for Viber video/image: absolute HTTPS URL where /uploads is reachable (same host as browser or CDN). Example: https://viber.oneclick.rs/uploads — NOT http://api:3901. Empty = wrong legacy default and Comtrade often returns substatus 28.
      PublicUploads__BaseUrl: ${PUBLIC_UPLOADS_BASE_URL:-}
      # Passed into the container (root .env alone is NOT enough — list here or use env_file). Next id = max(MAX(viber_message_id), Floor)+1 on campaign launch.
      Messaging__CampaignLeadViberMessageId__Floor: ${Messaging__CampaignLeadViberMessageId__Floor:-0}
      # Optional shorter alias (overrides Floor when set in Program.cs after env load); use e.g. 50000000 in .env
      VIBER_CAMPAIGN_MESSAGE_ID_FLOOR: ${VIBER_CAMPAIGN_MESSAGE_ID_FLOOR:-}
    volumes:
      - api-logs:/app/logs
      - api-uploads:/app/UploadedFiles
    # Host + nginx need this; without it only other containers (e.g. dashboard) can reach api:3901.
    ports:
      - "127.0.0.1:3901:3901"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped
    profiles: ["full"]

  postgres:
    image: postgres:17
    container_name: oneclick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneclickecho_admin
      # Must match Password= in ConnectionStrings__Database (.env). Set POSTGRES_PASSWORD in .env (do not commit real secrets).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_set_in_dot_env}
      POSTGRES_DB: oneclickecho
    ports:
      # Bind to loopback only (avoid exposing Postgres on all interfaces).
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneclickecho_admin -d oneclickecho"]
      interval: 5s
      timeout: 5s
      retries: 5

  log-rotator:
    build:
      context: .
      dockerfile: docker/log-rotation/Dockerfile
    image: oneclickecho-log-rotator:local
    volumes:
      - api-logs:/app/logs
    environment:
      LOG_DIR: /app/logs
      LOG_GZIP_MMIN: "2940"
      LOG_DELETE_GZ_DAYS: "40"
    restart: unless-stopped
    profiles: ["full"]
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile_Dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3901}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3901}
    image: oneclickecho-dashboard:local
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3901}
    ports:
      - "3800:3800"
    restart: unless-stopped
    profiles: ["full"]
  oneclickecho-seq:
    image: datalust/seq:latest
    container_name: oneclickecho.seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - 5341:5341
      - 8081:80
  redis:
    image: redis:latest
    container_name: oneclickecho.redis
    ports:
      - 6379:6379

volumes:
  api-logs:
  api-uploads:
  pgdata: